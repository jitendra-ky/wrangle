services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: wrangle
      POSTGRES_USER: wrangle
      POSTGRES_PASSWORD: wrangle
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "wrangle"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Django API (Gunicorn) ───────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    command:
      - gunicorn
      - zproject.wsgi:application
      - --bind
      - "0.0.0.0:8000"
      - --workers
      - "2"
      - --timeout
      - "120"
    ports:
      - "8000:8000"
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build: .
    restart: unless-stopped
    command:
      - celery
      - -A
      - zproject
      - worker
      - --loglevel=info
      - --concurrency=2
    env_file: .env.docker
    environment:
      SKIP_MIGRATE: "1"   # api service owns migrations; worker must not race it
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Shared with api so worker can read uploaded CSV files
      - media_data:/app/media

# ── Named volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_data:   # Persists PostgreSQL data across restarts
  media_data:      # Shared upload storage between api and worker
